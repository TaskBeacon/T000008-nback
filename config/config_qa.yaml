# ============================================================================
# QA config (dev + qa)
# - Used by: python main.py qa --config config/config_qa.yaml
# - Scope: qa/dev only (no sim section in this file)
# ============================================================================

# === Subject Form ===========================================================
subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3
  - name: subname
    type: string
  - name: age
    type: int
    constraints:
      min: 5
      max: 60
  - name: gender
    type: choice
    choices:
      - Male
      - Female

# === Subject Mapping ========================================================
subinfo_mapping:
  subject_id: 被试号
  subname: 被试姓名(拼音)
  age: 年龄
  gender: 性别
  Male: 男
  Female: 女
  registration_failed: 注册失败。
  registration_successful: 注册成功！
  invalid_input: "字段 {field} 输入无效"

# === Display / Window =======================================================
window:
  size:
    - 1920
    - 1080
  units: deg
  screen: 1
  bg_color: gray
  fullscreen: true
  monitor_width_cm: 60
  monitor_distance_cm: 72

# === Task ===================================================================
task:
  task_name: eeg_nback
  save_path: ./outputs/qa
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: false
  total_blocks: 1
  total_trials: 20
  trial_per_block: 20
  conditions:
    - match
    - nomatch
  key_list:
    - space
    - up
  match_key: space
  nomatch_key: up
  delta: 0.0
  seed_mode: same_across_sub

# === Stimuli ================================================================
stimuli:
  stim_digit:
    type: text
    text: "*"
    color: white

  stim_iti:
    type: text
    text: ""
    color: black

  instruction_1back:
    type: textbox
    text: |
      【1-back 质检模式】

      相同按【空格键】
      不同按【上方向键】

      按【空格键】开始。
    font: SimHei
    alignment: center
    letterHeight: 0.78
    color: white

  instruction_2back:
    type: textbox
    text: |
      【2-back 质检模式】

      相同按【空格键】
      不同按【上方向键】

      按【空格键】开始。
    font: SimHei
    alignment: center
    letterHeight: 0.78
    color: white

  block_break:
    type: text
    text: |
      质检分段结束
      匹配试次正确率：{acc}

      按【空格键】继续
    color: white
    height: 0.78

  good_bye:
    type: textbox
    text: |
      质检完成。
      按【空格键】退出。
    color: white
    font: SimHei
    alignment: center
    letterHeight: 0.78

# === Timing =================================================================
timing:
  probe_duration: 0.8
  iti_duration: 1.2

# === Triggers ===============================================================
triggers:
  map:
    exp_onset: 98
    exp_end: 99
    block_onset: 100
    block_end: 101
    match_onset: 2
    nomatch_onset: 3
    key_press: 4
    no_response: 5

  driver:
    type: serial_url
    url: loop://
    baudrate: 115200
    timeout: 1
    prefix:
      - 1
      - 225
      - 1
      - 0

  policy:
    strict: false

  timing:
    post_delay_s: 0.001

# === QA Runtime =============================================================
qa:
  output_dir: outputs/qa
  enable_scaling: true
  timing_scale: 0.05
  min_frames: 1
  strict: false
  max_wait_s: 10.0
  acceptance_criteria:
    required_columns:
      - condition
      - nback_probe_onset_trigger
    expected_trial_count: 20
    allowed_keys:
      - space
      - up
    triggers_required: true
